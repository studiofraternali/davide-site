<!DOCTYPE html>
<html lang="it">
<head>

<link rel="stylesheet" href="style.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact – Davide F. Fraternali</title>

</head>

<body>

<header>
<div class="logo">
<img src="logo_corvi.svg" alt="">
<span>Davide F. Fraternali</span>
</div>
</header>

<section class="contact-page">

<h1>Contatti / Write</h1>

<form action="https://formspree.io/f/yourcode" method="POST">

<input type="text" name="name" placeholder="Name / Nome" required>

<input type="email" name="email" placeholder="Email" required>

<textarea name="message" placeholder="Message / Messaggio" required></textarea>

<button type="submit">Send</button>

</form>

</section>

</body>
